{% extends 'base.html' %}
{% block title %}Delivery Partner Registration{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="form-container animate-fade-up" style="max-width:520px;">
        <h1 class="form-title">Become a Delivery Partner</h1>
        <p class="form-subtitle">Earn money delivering food in your city</p>
        <form method="post" class="validated-form" novalidate>
            {% csrf_token %}
            {% include 'includes/form_fields.html' %}
            <button type="submit" class="btn btn-primary btn-block btn-lg">Register</button>
        </form>
        <p class="form-footer"><a href="{% url 'login' %}">Already registered? Sign In</a></p>
    </div>
</div>
{% endblock %}
