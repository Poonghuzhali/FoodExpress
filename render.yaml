services:
  - type: web
    name: foodexpress
    runtime: python
    plan: free
    region: singapore
    repo: https://github.com/Poonghuzhali/FoodExpress
    branch: master
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate --no-input && python manage.py seed_data || true
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: foodexpress-db
          property: connectionString

databases:
  - name: foodexpress-db
    plan: free
    region: singapore
    databaseName: foodexpress
    user: foodexpress
    postgresMajorVersion: "16"
